name: 🎭 Playwright TOTP Tests - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 6:00 AM UTC (adjust timezone as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test Environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      browser:
        description: 'Browser to test'
        required: true
        default: 'chromium'
        type: choice
        options:
        - chromium
        - firefox
        - webkit
        - all

jobs:
  test:
    name: 🧪 Playwright Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: 
          - ${{ github.event.inputs.browser == 'all' && 'chromium' || github.event.inputs.browser || 'chromium' }}
        include:
          - browser: chromium
            project: "Desktop Chrome"
          - browser: firefox
            project: "Desktop Firefox"  
          - browser: webkit
            project: "Desktop Safari"

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: |
        npm ci
        npx playwright install --with-deps ${{ matrix.browser }}

    - name: ☕ Setup Java for Allure
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: 🔧 Install Allure CLI
      run: |
        npm install -g allure-commandline

    - name: 🔐 Configure Environment
      env:
        D365_URL: ${{ secrets.D365_URL }}
        D365_EMAIL: ${{ secrets.D365_EMAIL }}
        D365_PASSWORD: ${{ secrets.D365_PASSWORD }}
        TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
      run: |
        echo "D365_URL=$D365_URL" >> .env
        echo "D365_EMAIL=$D365_EMAIL" >> .env
        echo "D365_PASSWORD=$D365_PASSWORD" >> .env
        echo "TOTP_SECRET=$TOTP_SECRET" >> .env
        echo "CI=true" >> .env

    - name: 🧪 Run Playwright Tests
      env:
        ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
        BROWSER: ${{ matrix.browser }}
      run: |
        echo "🚀 Starting Playwright tests with ${{ matrix.browser }} browser"
        npm run test:all-reports
      continue-on-error: true

    - name: 📊 Generate Allure Report
      if: always()
      run: |
        echo "📈 Generating Allure report..."
        allure generate allure-results --clean -o allure-report
        echo "✅ Allure report generated successfully"

    - name: 📸 Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.browser }}-${{ github.run_number }}
        path: screenshots/
        retention-days: 30

    - name: 📹 Upload Videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: videos-${{ matrix.browser }}-${{ github.run_number }}
        path: test-results/
        retention-days: 30

    - name: 📊 Upload Playwright HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.browser }}-${{ github.run_number }}
        path: playwright-report/
        retention-days: 30

    - name: 🌟 Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}-${{ github.run_number }}
        path: allure-report/
        retention-days: 30

    - name: 📈 Upload Custom Visual Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-report-${{ matrix.browser }}-${{ github.run_number }}
        path: visual-report.html
        retention-days: 30

    - name: 📋 Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}-${{ github.run_number }}
        path: |
          test-results/results.json
          test-results/results.xml
        retention-days: 30

  publish-reports:
    name: 📊 Publish Reports
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 📊 Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: 📈 Publish Allure Report
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: artifacts/allure-report-chromium-${{ github.run_number }}/
        destination_dir: allure-report
        keep_files: false

    - name: 🏠 Publish Playwright Report
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: artifacts/playwright-report-chromium-${{ github.run_number }}/
        destination_dir: playwright-report
        keep_files: false

    - name: 📊 Create Test Summary
      if: always()
      run: |
        echo "# 🎭 Playwright Test Results - Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **🔗 Commit**: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
        echo "- **🌿 Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **👤 Actor**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **⏰ Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📈 Reports Available" >> $GITHUB_STEP_SUMMARY
        echo "- 🌟 **[Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report/)**" >> $GITHUB_STEP_SUMMARY
        echo "- 🏠 **[Playwright HTML Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/playwright-report/)**" >> $GITHUB_STEP_SUMMARY
        echo "- 📊 **[Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🎯 Test Environment" >> $GITHUB_STEP_SUMMARY
        echo "- **🌍 Environment**: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **🌐 Browser**: ${{ github.event.inputs.browser || 'chromium' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **🔐 TOTP Authentication**: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
        echo "- **🏠 D365 Integration**: ✅ Active" >> $GITHUB_STEP_SUMMARY

  notify:
    name: 🔔 Notifications
    runs-on: ubuntu-latest
    needs: [test, publish-reports]
    if: always()
    
    steps:
    - name: 📱 Slack Notification
      if: ${{ secrets.SLACK_WEBHOOK }}
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ needs.test.result }}
        channel: '#test-automation'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        custom_payload: |
          {
            "attachments": [
              {
                "color": "${{ needs.test.result == 'success' && 'good' || 'danger' }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🎭 Playwright Test Results"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Status:* ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }}"
                      },
                      {
                        "type": "mrkdwn", 
                        "text": "*Branch:* `${{ github.ref_name }}`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Commit:* `${{ github.sha }}`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Actor:* @${{ github.actor }}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "📊 View Reports"
                        },
                        "url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report/"
                      },
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "🔍 View Action"
                        },
                        "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }

    - name: 💬 Teams Notification
      if: ${{ secrets.TEAMS_WEBHOOK }}
      uses: skitionek/notify-microsoft-teams@master
      with:
        webhook_url: ${{ secrets.TEAMS_WEBHOOK }}
        overwrite: |
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Playwright Test Results",
            "themeColor": "${{ needs.test.result == 'success' && '28a745' || 'dc3545' }}",
            "sections": [
              {
                "activityTitle": "🎭 Playwright TOTP Test Results",
                "activitySubtitle": "Run #${{ github.run_number }}",
                "facts": [
                  {
                    "name": "Status:",
                    "value": "${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }}"
                  },
                  {
                    "name": "Branch:",
                    "value": "${{ github.ref_name }}"
                  },
                  {
                    "name": "Environment:",
                    "value": "${{ github.event.inputs.environment || 'staging' }}"
                  },
                  {
                    "name": "Browser:",
                    "value": "${{ github.event.inputs.browser || 'chromium' }}"
                  }
                ],
                "markdown": true
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "📊 View Allure Report",
                "targets": [
                  {
                    "os": "default",
                    "uri": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report/"
                  }
                ]
              },
              {
                "@type": "OpenUri",
                "name": "🔍 View GitHub Action",
                "targets": [
                  {
                    "os": "default",
                    "uri": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }