# CI Trigger - Smart path-based trigger on code changes
trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - tests/**
      - pages/**
      - utils/**
      - global-setup.ts
      - playwright.config.ts
      - playwright.service.config.ts
      - package.json
      - package-lock.json
      - azure-pipelines-mpt.yml
    exclude:
      - docs/**
      - '*.md'
      - DOCUMENTATION-INDEX.md
      - IMPLEMENTATION-SUMMARY.md

# PR Trigger - Run tests when Pull Requests are created or updated
pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/**
      - pages/**
      - utils/**
      - global-setup.ts
      - playwright.config.ts
      - playwright.service.config.ts
      - package.json
      - package-lock.json
      - azure-pipelines-mpt.yml

pool:
  vmImage: 'windows-latest'

variables:
  # Using Access Token Authentication (enabled in workspace)
  - group: Playwright-Testing-Secrets
  
  - name: PLAYWRIGHT_SERVICE_URL
    value: 'wss://eastus.api.playwright.microsoft.com/playwrightworkspaces/03f9e658-c2b3-45a4-9689-0c639e6f99c0/browsers'
  - name: D365_URL
    value: 'https://avs-isv-puat.sandbox.operations.dynamics.com'
  - name: USE_ACCESS_TOKEN
    value: 'true' # Using access token - workspace has it enabled

stages:
  - stage: Test
    displayName: 'Run Playwright Tests with Microsoft Playwright Testing'
    jobs:
      - job: PlaywrightTests
        displayName: 'Execute Tests at Scale'
        timeoutInMinutes: 60
        
        steps:
          # Checkout with full history for git operations
          - checkout: self
            fetchDepth: 0
            persistCredentials: true
          
          # Download authentication session file
          - task: DownloadSecureFile@1
            name: d365AuthFile
            displayName: '🔐 Download D365 Authentication Session'
            inputs:
              secureFile: 'D365AuthFile.json'
          
          # Setup authentication directory
          - task: PowerShell@2
            displayName: '📦 Setup Authentication'
            inputs:
              targetType: 'inline'
              script: |
                New-Item -ItemType Directory -Force -Path "auth"
                Copy-Item "$(d365AuthFile.secureFilePath)" -Destination "auth/D365AuthFile.json"
                Write-Host "✅ Session file ready"
          
          # Install Node.js
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: '📦 Install Node.js'

          # Install Python
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.13'
              addToPath: true
            displayName: '🐍 Install Python 3.13'

          # Install Python dependencies
          - task: PowerShell@2
            displayName: '📦 Install Python Dependencies'
            inputs:
              targetType: 'inline'
              script: |
                python -m pip install --upgrade pip
                pip install ipykernel pandas matplotlib numpy jupyter
          
          # Install dependencies
          - task: PowerShell@2
            displayName: '📦 Install Dependencies'
            inputs:
              targetType: 'inline'
              script: 'npm ci'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Install Allure reporter
          - task: PowerShell@2
            displayName: '📊 Install Allure Reporter'
            inputs:
              targetType: 'inline'
              script: 'npm install --save-dev @playwright/test allure-playwright'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Install Playwright browsers
          - task: PowerShell@2
            displayName: '🎭 Install Playwright Browsers'
            inputs:
              targetType: 'inline'
              script: 'npx playwright install --with-deps'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Run Playwright tests with Microsoft Playwright Testing service
          # Supports both Service Principal (via AzureCLI) and Access Token authentication
          - task: PowerShell@2
            condition: eq(variables['USE_ACCESS_TOKEN'], 'true')
            displayName: '🧪 Run Playwright Tests - Access Token Auth (1 Worker)'
            env:
              PLAYWRIGHT_SERVICE_URL: $(PLAYWRIGHT_SERVICE_URL)
              PLAYWRIGHT_SERVICE_ACCESS_TOKEN: $(PLAYWRIGHT_SERVICE_ACCESS_TOKEN)
              D365_URL: $(D365_URL)
              CI: 'true'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🚀 Running Playwright tests with Access Token authentication..." -ForegroundColor Cyan
                Write-Host "📊 Service URL: $env:PLAYWRIGHT_SERVICE_URL" -ForegroundColor Yellow
                Write-Host "🌐 D365 URL: $env:D365_URL" -ForegroundColor Yellow
                Write-Host "⚡ Parallel workers: 1" -ForegroundColor Yellow
                Write-Host "🔐 Authentication: Access Token" -ForegroundColor Green
                Write-Host ""
                
                npx playwright test -c playwright.service.config.ts --workers=1
                
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "❌ Tests failed with exit code: $LASTEXITCODE" -ForegroundColor Red
                  exit $LASTEXITCODE
                }
                
                Write-Host ""
                Write-Host "✅ Tests completed successfully!" -ForegroundColor Green
                Write-Host "📊 View results at: https://playwright.microsoft.com/" -ForegroundColor Cyan
              workingDirectory: '$(System.DefaultWorkingDirectory)'

          # Generate test report from Jupyter notebook
          - task: PowerShell@2
            condition: succeededOrFailed()
            displayName: '📊 Generate Test Report (Jupyter Notebook)'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🚀 Generating test report from Jupyter notebook..." -ForegroundColor Cyan
                python -m jupyter nbconvert --to notebook --execute test_results_report.ipynb
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "✅ Test report generated successfully!" -ForegroundColor Green
                } else {
                  Write-Host "⚠️ Report generation failed, but continuing..." -ForegroundColor Yellow
                }
              workingDirectory: '$(System.DefaultWorkingDirectory)'

          # Publish test results
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/junit.xml'
              testRunTitle: 'D365 Playwright Tests (Microsoft Playwright Testing)'
              mergeTestResults: true
            displayName: '📊 Publish Test Results'
          
          # Check if report directory exists
          - task: PowerShell@2
            condition: always()
            displayName: '🔍 Check Report Directory'
            inputs:
              targetType: 'inline'
              script: |
                if (Test-Path 'playwright-report') {
                  Write-Host "##vso[task.setvariable variable=ReportExists]true"
                  Write-Host "✅ Report directory exists" -ForegroundColor Green
                } else {
                  Write-Host "##vso[task.setvariable variable=ReportExists]false"
                  Write-Host "⚠️ No report directory found" -ForegroundColor Yellow
                }
          
          # Upload Playwright HTML report (only if directory exists)
          - task: PublishPipelineArtifact@1
            condition: and(succeededOrFailed(), eq(variables['ReportExists'], 'true'))
            inputs:
              targetPath: 'playwright-report'
              artifact: 'Playwright-HTML-Report'
              publishLocation: 'pipeline'
            displayName: '📄 Upload Playwright HTML Report'
          
          # Upload test results artifacts
          - task: PublishPipelineArtifact@1
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'Test-Results-Artifacts'
              publishLocation: 'pipeline'
            displayName: '📸 Upload Test Artifacts (Screenshots/Videos)'
          
          # Upload Allure results
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-results'
              artifact: 'Allure-Results'
              publishLocation: 'pipeline'
            displayName: '📊 Upload Allure Results'

          # Upload Test Report Files (CSV, JSON, PNG)
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)'
              artifact: 'Test-Report-Artifacts'
              publishLocation: 'pipeline'
              patterns: |
                test_results.csv
                test_results.json
                test_results_visualization.png
                test_results_report.ipynb
            continueOnError: true
            displayName: '📊 Upload Test Report (CSV, JSON, PNG, Notebook)'

          # Commit test results back to repository (Auto-sync with notebook)
          - task: PowerShell@2
            displayName: '🔄 Auto-sync Test Results to Repository'
            condition: succeededOrFailed()
            continueOnError: true
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🔄 Auto-syncing test results to repository..." -ForegroundColor Cyan
                
                # Configure git
                git config --global user.email "azure-pipelines@example.com"
                git config --global user.name "Azure Pipelines Bot"
                git config --global core.longpaths true
                
                # Ensure we're on the correct branch (handle detached HEAD state)
                Write-Host "📌 Checking git branch state..." -ForegroundColor Yellow
                $currentBranch = git rev-parse --abbrev-ref HEAD
                Write-Host "   Current branch: $currentBranch" -ForegroundColor Gray
                if ($currentBranch -eq "HEAD") {
                    Write-Host "   Detached HEAD detected, checking out $(Build.SourceBranch)..." -ForegroundColor Yellow
                    git checkout -B $(Build.SourceBranch)
                }
                
                # Check for changes
                Write-Host "📋 Current git status:" -ForegroundColor Yellow
                git status --porcelain
                
                # Check if test result files exist
                $hasChanges = $false
                if ((Test-Path "test_results.csv") -or (Test-Path "test_results.json") -or (Test-Path "test_results_visualization.png") -or (Test-Path "test_cases_detailed.csv")) {
                    $hasChanges = $true
                }
                
                # Check if allure-results has files
                if (Test-Path "allure-results") {
                    $allureFiles = @(Get-ChildItem -Path "allure-results" -Recurse -File -ErrorAction SilentlyContinue)
                    if ($allureFiles.Count -gt 0) {
                        $hasChanges = $true
                    }
                }
                
                if ($hasChanges) {
                    Write-Host "📝 Found test results to commit..." -ForegroundColor Green
                    git add test_results.csv test_results.json test_results_visualization.png test_cases_detailed.csv 2>$null
                    git add allure-results/ 2>$null
                    
                    $status = git status --porcelain
                    if (-not $status) {
                        Write-Host "✅ No changes to commit" -ForegroundColor Green
                    } else {
                        Write-Host "📝 Committing changes..." -ForegroundColor Cyan
                        git commit -m "🤖 Auto: Update test results from pipeline run #$(Build.BuildId)"
                        
                        Write-Host "🚀 Pushing to repository..." -ForegroundColor Cyan
                        Write-Host "   Branch: $(Build.SourceBranch)" -ForegroundColor Gray
                        
                        # Push without stderr redirect to avoid protocol message misinterpretation
                        git push origin $(Build.SourceBranch)
                        
                        if ($LASTEXITCODE -eq 0) {
                            Write-Host "✅ Test results committed and pushed successfully!" -ForegroundColor Green
                        } else {
                            Write-Host "⚠️ Push may have failed, checking status..." -ForegroundColor Yellow
                            git log -1 --oneline
                        }
                    }
                } else {
                    Write-Host "⚠️ No test results to commit" -ForegroundColor Yellow
                }

  # Generate Allure Report
  - stage: Report
    displayName: 'Generate Allure Report'
    dependsOn: Test
    condition: succeededOrFailed()
    jobs:
      - job: AllureReport
        displayName: 'Generate Allure HTML Report'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: DownloadPipelineArtifact@2
            condition: succeededOrFailed()
            inputs:
              artifact: 'Allure-Results'
              path: '$(System.DefaultWorkingDirectory)/allure-results'
            continueOnError: true
          
          - script: |
              mkdir -p allure-report
              if [ -d "allure-results" ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
                npm install -g allure-commandline
                allure generate allure-results --clean -o allure-report
                echo "✅ Allure report generated successfully"
              else
                echo "⚠️ No Allure results found - creating placeholder report"
                echo '<!DOCTYPE html><html><head><title>Allure Report - No Results</title><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;margin:40px;background:#f5f5f5}.container{background:#fff;padding:20px;border-radius:8px}h1{color:#d9534f}p{color:#666}</style></head><body><div class="container"><h1>No Allure Results Found</h1><p>The Allure results directory was empty or unavailable.</p><p>Check Test stage logs for details.</p></div></body></html>' > allure-report/index.html
                echo "✅ Placeholder report created"
              fi
            displayName: 'Generate Allure Report'
          
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-report'
              artifact: 'Allure-HTML-Report'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: 'Publish Allure HTML Report'
