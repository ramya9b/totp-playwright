# Azure DevOps Pipeline for Playwright D365 Tests
# Supports TOTP (local) and Service Principal (CI/CD) authentication

trigger:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - tests/*
    - pages/*
    - utils/*
    - playwright.config.ts
    - package.json

pr:
  branches:
    include:
    - main
    - develop

schedules:
# Daily at 9:00 AM IST (3:30 AM UTC)
- cron: "30 3 * * *"
  displayName: Daily 9:00 AM IST
  branches:
    include:
    - main
  always: true

# Daily at 6:00 PM IST (12:30 PM UTC)
- cron: "30 12 * * *"
  displayName: Daily 6:00 PM IST
  branches:
    include:
    - main
  always: true

variables:
  - group: D365-Credentials  # Contains: D365_URL, M365_USERNAME, M365_PASSWORD, TOTP_SECRET (TOTP) OR AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET (Service Principal)
  - name: nodeVersion
    value: '18.x'

jobs:
- job: PlaywrightTests
  displayName: 'Playwright D365 Authentication Tests'
  pool:
    vmImage: 'ubuntu-latest'
  
  timeoutInMinutes: 30
  
  steps:
  - task: NodeTool@0
    displayName: 'Setup Node.js'
    inputs:
      versionSpec: $(nodeVersion)

  - script: |
      npm ci
      npx playwright install --with-deps chromium
    displayName: 'Install Dependencies'

  - script: |
      echo "=== Verifying Variable Group ==="
      
      # Check authentication method
      if [ -n "$(AZURE_CLIENT_ID)" ] && [ -n "$(AZURE_CLIENT_SECRET)" ] && [ -n "$(AZURE_TENANT_ID)" ]; then
        echo "✅ Service Principal credentials detected - using App Registration authentication"
        AUTH_METHOD="Service Principal"
        
        if [ -z "$(AZURE_TENANT_ID)" ]; then
          echo "ERROR: AZURE_TENANT_ID is not set!"
          exit 1
        fi
        if [ -z "$(AZURE_CLIENT_ID)" ]; then
          echo "ERROR: AZURE_CLIENT_ID is not set!"
          exit 1
        fi
        if [ -z "$(AZURE_CLIENT_SECRET)" ]; then
          echo "ERROR: AZURE_CLIENT_SECRET is not set!"
          exit 1
        fi
      else
        echo "⚠️ Service Principal credentials not found - using TOTP authentication"
        AUTH_METHOD="TOTP"
        
        if [ -z "$(M365_USERNAME)" ]; then
          echo "ERROR: M365_USERNAME is not set!"
          exit 1
        fi
        if [ -z "$(M365_PASSWORD)" ]; then
          echo "ERROR: M365_PASSWORD is not set!"
          exit 1
        fi
        if [ -z "$(TOTP_SECRET)" ]; then
          echo "ERROR: TOTP_SECRET is not set!"
          exit 1
        fi
      fi
      
      if [ -z "$(D365_URL)" ]; then
        echo "ERROR: D365_URL is not set!"
        exit 1
      fi
      
      echo "✅ All required variables for $AUTH_METHOD authentication are configured"
    displayName: 'Verify Variables'
    env:
      D365_URL: $(D365_URL)
      M365_USERNAME: $(M365_USERNAME)
      M365_PASSWORD: $(M365_PASSWORD)
      TOTP_SECRET: $(TOTP_SECRET)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)

  - script: |
      echo "D365_URL=$(D365_URL)" > .env
      echo "M365_USERNAME=$(M365_USERNAME)" >> .env
      echo "M365_PASSWORD=$(M365_PASSWORD)" >> .env
      echo "TOTP_SECRET=$(TOTP_SECRET)" >> .env
      
      # Add Service Principal credentials if available
      if [ -n "$(AZURE_CLIENT_ID)" ]; then
        echo "AZURE_TENANT_ID=$(AZURE_TENANT_ID)" >> .env
        echo "AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)" >> .env
        echo "AZURE_CLIENT_SECRET=$(AZURE_CLIENT_SECRET)" >> .env
        echo "✅ Service Principal credentials added to .env"
      else
        echo "⚠️ No Service Principal credentials - using TOTP authentication"
      fi
      
      echo "=== Environment Configuration ==="
      echo ".env file contents (masked):"
      cat .env | sed 's/\(PASSWORD=\).*/\1***/' | sed 's/\(SECRET=\).*/\1***/' | sed 's/\(CLIENT_SECRET=\).*/\1***/'
    displayName: 'Configure Environment'
    env:
      M365_USERNAME: $(M365_USERNAME)
      M365_PASSWORD: $(M365_PASSWORD)
      TOTP_SECRET: $(TOTP_SECRET)
      M365_PIN: $(M365_PIN)

  - script: |
      npx playwright test --reporter=html --reporter=junit --reporter=line
    displayName: 'Run Playwright Tests (Headless Mode)'
    continueOnError: true
    env:
      CI: true
      PLAYWRIGHT_HTML_REPORT: playwright-report

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results/results.xml'
      testRunTitle: 'Playwright TOTP Tests'
      mergeTestResults: true
      failTaskOnFailedTests: false

  - script: |
      echo "Checking for generated reports..."
      if [ -d "playwright-report" ]; then
        echo "✅ Playwright HTML report found"
        ls -la playwright-report
      else
        echo "⚠️ No Playwright HTML report found"
      fi
      if [ -d "test-results" ]; then
        echo "✅ Test results directory found"
        ls -la test-results
      else
        echo "⚠️ No test-results directory found"
      fi
      if [ -f "auth/D365AuthFile.json" ]; then
        echo "✅ Session file created"
      else
        echo "⚠️ No session file found"
      fi
    displayName: 'Check Generated Files'
    condition: always()

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Playwright HTML Report'
    condition: and(always(), or(succeeded(), failed()))
    continueOnError: true
    inputs:
      pathToPublish: 'playwright-report'
      artifactName: 'playwright-report'
      publishLocation: 'Container'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Test Results & Screenshots'
    condition: and(always(), or(succeeded(), failed()))
    continueOnError: true
    inputs:
      pathToPublish: 'test-results'
      artifactName: 'test-results'
      publishLocation: 'Container'
