# Azure DevOps Pipeline for Playwright TOTP Tests

trigger:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - tests/*
    - pages/*
    - utils/*
    - playwright.config.ts
    - package.json

pr:
  branches:
    include:
    - main
    - develop

schedules:
# Daily at 9:00 AM IST (3:30 AM UTC)
- cron: "30 3 * * *"
  displayName: Daily 9:00 AM IST
  branches:
    include:
    - main
  always: true

# Daily at 6:00 PM IST (12:30 PM UTC)
- cron: "30 12 * * *"
  displayName: Daily 6:00 PM IST
  branches:
    include:
    - main
  always: true

variables:
  - group: D365-Credentials
  - name: nodeVersion
    value: '18.x'

jobs:
- job: PlaywrightTests
  displayName: 'Playwright TOTP Tests'
  pool:
    vmImage: 'ubuntu-latest'
  
  strategy:
    matrix:
      Chromium:
        browserName: 'chromium'
      Firefox:
        browserName: 'firefox'
      WebKit:
        browserName: 'webkit'
  
  timeoutInMinutes: 30
  
  steps:
  - task: NodeTool@0
    displayName: 'Setup Node.js'
    inputs:
      versionSpec: $(nodeVersion)

  - script: |
      npm ci
      npx playwright install --with-deps $(browserName)
    displayName: 'Install Dependencies'

  - script: |
      echo "D365_USERNAME=$(D365_USERNAME)" >> .env
      echo "D365_PASSWORD=$(D365_PASSWORD)" >> .env
      echo "TOTP_SECRET=$(D365_TOTP_SECRET)" >> .env
      echo "D365_URL=https://avs-isv-puat.sandbox.operations.dynamics.com" >> .env
    displayName: 'Configure Environment'
    env:
      D365_USERNAME: $(D365_USERNAME)
      D365_PASSWORD: $(D365_PASSWORD)
      D365_TOTP_SECRET: $(D365_TOTP_SECRET)

  - script: |
      npx playwright test --project=$(browserName)
    displayName: 'Run Playwright Tests'
    continueOnError: true
    env:
      BROWSER: $(browserName)

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/junit-results.xml'
      testRunTitle: 'Playwright Tests - $(browserName)'
      mergeTestResults: true
      failTaskOnFailedTests: false

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Playwright HTML Report'
    condition: always()
    inputs:
      pathToPublish: 'playwright-report'
      artifactName: 'playwright-report-$(browserName)'
      publishLocation: 'Container'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Test Results & Screenshots'
    condition: always()
    inputs:
      pathToPublish: 'test-results'
      artifactName: 'test-results-$(browserName)'
      publishLocation: 'Container'
