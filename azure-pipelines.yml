trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

# UPDATED: Using global-setup for authentication - commit 2e5b630
variables:
  # Using Access Token Authentication (enabled in workspace)
  - group: Playwright-Testing-Secrets
  
  - name: PLAYWRIGHT_SERVICE_URL
    value: 'wss://eastus.api.playwright.microsoft.com/playwrightworkspaces/03f9e658-c2b3-45a4-9689-0c639e6f99c0/browsers'
  - name: D365_URL
    value: 'https://avs-isv-puat.sandbox.operations.dynamics.com'
  - name: USE_ACCESS_TOKEN
    value: 'true' # Using access token - workspace has it enabled

stages:
  - stage: Test
    displayName: 'Run Playwright Tests with Microsoft Playwright Testing'
    jobs:
      - job: PlaywrightTests
        displayName: 'Execute Tests at Scale'
        timeoutInMinutes: 60
        
        steps:
          # Skip session file download - will use TOTP authentication
          # - task: DownloadSecureFile@1
          #   name: d365AuthFile
          #   displayName: '🔐 Download D365 Authentication Session'
          #   inputs:
          #     secureFile: 'D365AuthFile.json'
          # 
          # - task: PowerShell@2
          #   displayName: '📦 Setup Authentication'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       New-Item -ItemType Directory -Force -Path "auth"
          #       Copy-Item "$(d365AuthFile.secureFilePath)" -Destination "auth/D365AuthFile.json"
          #       Write-Host "✅ Session file ready"
          
          # Use pre-installed Node.js on Azure agent
          - script: |
              echo "Node.js version:"
              node --version
              echo "npm version:"
              npm --version
            displayName: '📦 Verify Node.js'
          
          # Install dependencies with retry logic
          - script: |
              echo "Configuring npm for reliability..."
              npm config set fetch-retries 5
              npm config set fetch-retry-mintimeout 20000
              npm config set fetch-retry-maxtimeout 120000
              npm config set registry https://registry.npmjs.org/
              
              echo ""
              echo "Installing npm dependencies (with retries)..."
              max_retries=3
              retry_count=0
              success=false
              
              while [ "$success" = false ] && [ $retry_count -lt $max_retries ]; do
                retry_count=$((retry_count + 1))
                echo "Attempt $retry_count of $max_retries..."
                
                if npm install; then
                  success=true
                  echo "✅ Dependencies installed successfully!"
                else
                  echo "❌ Attempt $retry_count failed. Waiting 10 seconds..."
                  sleep 10
                fi
              done
              
              if [ "$success" = false ]; then
                echo "❌ Failed to install dependencies after $max_retries attempts"
                exit 1
              fi
            displayName: '📦 Install Dependencies'
          
          # Install Playwright browsers
          - script: npx playwright install --with-deps chromium
            displayName: '🎭 Install Playwright Browsers'
          
          # Run Playwright tests (standard mode - MPT service causing auth issues)
          - script: |
              echo "🚀 Running Playwright tests in standard mode..."
              echo "🌐 D365 URL: $D365_URL"
              echo "⚡ Parallel workers: 10"
              echo "🔐 Authentication: TOTP"
              echo ""
              echo "Note: Running without Microsoft Playwright Testing service due to"
              echo "      access token authentication limitations. Tests will run on"
              echo "      Azure agent with local browsers."
              echo ""
              
              npx playwright test --workers=10
              
              if [ $? -ne 0 ]; then
                echo "❌ Tests failed with exit code: $?"
                exit $?
              fi
              
              echo ""
              echo "✅ Tests completed successfully!"
            displayName: '🧪 Run Playwright Tests (10 Workers - Standard Mode)'
            env:
              D365_URL: $(D365_URL)
              M365_USERNAME: $(M365_USERNAME)
              M365_PASSWORD: $(M365_PASSWORD)
              TOTP_SECRET: $(TOTP_SECRET)
              CI: 'true'
          
          # Publish test results
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/junit.xml'
              testRunTitle: 'D365 Playwright Tests (Microsoft Playwright Testing)'
              mergeTestResults: true
            displayName: '📊 Publish Test Results'
          
          # Upload Playwright HTML report
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'Playwright-HTML-Report'
              publishLocation: 'pipeline'
            displayName: '📄 Upload Playwright HTML Report'
          
          # Upload test results artifacts
          - task: PublishPipelineArtifact@1
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'Test-Results-Artifacts'
              publishLocation: 'pipeline'
            displayName: '📸 Upload Test Artifacts (Screenshots/Videos)'
          
          # Upload Allure results
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-results'
              artifact: 'Allure-Results'
              publishLocation: 'pipeline'
            displayName: '📊 Upload Allure Results'

  # Generate Allure Report
  - stage: Report
    displayName: 'Generate Allure Report'
    dependsOn: Test
    condition: succeededOrFailed()
    jobs:
      - job: AllureReport
        displayName: 'Generate Allure HTML Report'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'Allure-Results'
              path: '$(System.DefaultWorkingDirectory)/allure-results'
          
          - script: |
              npm install -g allure-commandline
              allure generate allure-results --clean -o allure-report
            displayName: 'Generate Allure Report'
          
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'allure-report'
              artifact: 'Allure-HTML-Report'
              publishLocation: 'pipeline'
            displayName: 'Publish Allure HTML Report'
