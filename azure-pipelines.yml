# Auto-authorize resources (IMPORTANT: Fixes permission issues in scheduled runs)
# These resources are now explicitly declared to allow scheduled pipeline access
resources:
  variableGroups:
  - group: Playwright-Testing-Secrets_totp
  - group: Playwright-Testing-Secrets
  repositories:
  - repository: self
    type: git
    ref: refs/heads/main
  secureFiles:
  - D365AuthFile.json

# CI Trigger - Smart path-based trigger on code changes
trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - tests/**
      - pages/**
      - utils/**
      - global-setup.ts
      - playwright.config.ts
      - playwright.service.config.ts
      - package.json
      - package-lock.json
      - azure-pipelines.yml
    exclude:
      - docs/**
      - '*.md'
      - DOCUMENTATION-INDEX.md
      - IMPLEMENTATION-SUMMARY.md

# PR Trigger - Run tests when Pull Requests are created or updated
pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/**
      - pages/**
      - utils/**
      - global-setup.ts
      - playwright.config.ts
      - playwright.service.config.ts
      - package.json
      - package-lock.json
      - azure-pipelines.yml

# Scheduled triggers for daily and weekly execution
schedules:
  # Daily schedule - runs every day at 10:30 AM IST (5:00 AM UTC)
  - cron: "0 5 * * *"
    displayName: "Daily Test Execution at 10:30 AM IST (5:00 AM UTC)"
    branches:
      include:
        - main
    always: true  # Always run even if no changes
    batchSize: 1

  # Weekly schedule - runs every Monday at 10:30 AM IST (5:00 AM UTC)
  - cron: "0 5 * * 1"
    displayName: "Weekly Test Execution - Monday 10:30 AM IST (5:00 AM UTC)"
    branches:
      include:
        - main
    always: true  # Always run even if no changes
    batchSize: 1

pool:
  vmImage: 'windows-latest'

variables:
  # Using Access Token Authentication (enabled in workspace)
  - group: Playwright-Testing-Secrets
  
  - name: PLAYWRIGHT_SERVICE_URL
    value: 'wss://eastus.api.playwright.microsoft.com/playwrightworkspaces/03f9e658-c2b3-45a4-9689-0c639e6f99c0/browsers'
  - name: D365_URL
    value: 'https://avs-isv-puat.sandbox.operations.dynamics.com'
  - name: USE_ACCESS_TOKEN
    value: 'true' # Using access token - workspace has it enabled

stages:
  - stage: Test
    displayName: 'Run Playwright Tests with Microsoft Playwright Testing'
    jobs:
      - job: PlaywrightTests
        displayName: 'Execute Tests at Scale'
        timeoutInMinutes: 60
        
        steps:
          # Download authentication session file
          - task: DownloadSecureFile@1
            name: d365AuthFile
            displayName: '🔐 Download D365 Authentication Session'
            inputs:
              secureFile: 'D365AuthFile.json'
          
          # Setup authentication directory
          - task: PowerShell@2
            displayName: '📦 Setup Authentication'
            inputs:
              targetType: 'inline'
              script: |
                New-Item -ItemType Directory -Force -Path "auth"
                Copy-Item "$(d365AuthFile.secureFilePath)" -Destination "auth/D365AuthFile.json"
                Write-Host "✅ Session file ready"
          
          # Install Node.js
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: '📦 Install Node.js'
          
          # Install dependencies
          - task: PowerShell@2
            displayName: '📦 Install Dependencies'
            inputs:
              targetType: 'inline'
              script: 'npm ci'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Install Allure reporter
          - task: PowerShell@2
            displayName: '📊 Install Allure Reporter'
            inputs:
              targetType: 'inline'
              script: 'npm install --save-dev @playwright/test allure-playwright'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Install Playwright browsers
          - task: PowerShell@2
            displayName: '🎭 Install Playwright Browsers'
            inputs:
              targetType: 'inline'
              script: 'npx playwright install --with-deps'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Run Playwright tests with Microsoft Playwright Testing service
          # Supports both Service Principal (via AzureCLI) and Access Token authentication
          - task: PowerShell@2
            condition: eq(variables['USE_ACCESS_TOKEN'], 'true')
            displayName: '🧪 Run Playwright Tests - Access Token Auth (1 Worker)'
            env:
              PLAYWRIGHT_SERVICE_URL: $(PLAYWRIGHT_SERVICE_URL)
              PLAYWRIGHT_SERVICE_ACCESS_TOKEN: $(PLAYWRIGHT_SERVICE_ACCESS_TOKEN)
              D365_URL: $(D365_URL)
              CI: 'true'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🚀 Running Playwright tests with Access Token authentication..." -ForegroundColor Cyan
                Write-Host "📊 Service URL: $env:PLAYWRIGHT_SERVICE_URL" -ForegroundColor Yellow
                Write-Host "🌐 D365 URL: $env:D365_URL" -ForegroundColor Yellow
                Write-Host "⚡ Parallel workers: 1" -ForegroundColor Yellow
                Write-Host "🔐 Authentication: Access Token" -ForegroundColor Green
                Write-Host ""
                
                npx playwright test -c playwright.service.config.ts --workers=1
                
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "❌ Tests failed with exit code: $LASTEXITCODE" -ForegroundColor Red
                  exit $LASTEXITCODE
                }
                
                Write-Host ""
                Write-Host "✅ Tests completed successfully!" -ForegroundColor Green
                Write-Host "📊 View results at: https://playwright.microsoft.com/" -ForegroundColor Cyan
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Verify allure-results folder exists and has files
          - task: PowerShell@2
            condition: succeededOrFailed()
            displayName: '🔍 Verify Allure Results Generated'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "📋 Checking allure-results folder..." -ForegroundColor Yellow
                if (Test-Path 'allure-results') {
                  $files = @(Get-ChildItem -Path 'allure-results' -Recurse -File)
                  Write-Host "✅ allure-results folder found" -ForegroundColor Green
                  Write-Host "📊 Total files: $($files.Count)" -ForegroundColor Green
                  
                  if ($files.Count -gt 0) {
                    Write-Host "✅ Allure results successfully generated!" -ForegroundColor Green
                    Write-Host "📁 Sample files:" -ForegroundColor Cyan
                    $files | Select-Object -First 5 | ForEach-Object { Write-Host "   - $($_.Name)" }
                  } else {
                    Write-Host "⚠️ allure-results folder is empty" -ForegroundColor Yellow
                  }
                } else {
                  Write-Host "❌ allure-results folder NOT found" -ForegroundColor Red
                  Write-Host "📁 Contents of working directory:" -ForegroundColor Yellow
                  Get-ChildItem -Path $(System.DefaultWorkingDirectory) | Select-Object -First 20 | ForEach-Object { Write-Host "   - $($_.Name)" }
                }
          
          # Publish test results
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/junit.xml'
              testRunTitle: 'D365 Playwright Tests (Microsoft Playwright Testing)'
              mergeTestResults: true
            displayName: '📊 Publish Test Results'
          
          # Check if report directory exists
          - task: PowerShell@2
            condition: always()
            displayName: '🔍 Check Report Directory'
            inputs:
              targetType: 'inline'
              script: |
                if (Test-Path 'playwright-report') {
                  Write-Host "##vso[task.setvariable variable=ReportExists]true"
                  Write-Host "✅ Report directory exists" -ForegroundColor Green
                } else {
                  Write-Host "##vso[task.setvariable variable=ReportExists]false"
                  Write-Host "⚠️ No report directory found" -ForegroundColor Yellow
                }
          
          # Upload Playwright HTML report (only if directory exists)
          - task: PublishPipelineArtifact@1
            condition: and(succeededOrFailed(), eq(variables['ReportExists'], 'true'))
            inputs:
              targetPath: 'playwright-report'
              artifact: 'Playwright-HTML-Report'
              publishLocation: 'pipeline'
            displayName: '📄 Upload Playwright HTML Report'
          
          # Upload test results artifacts (JUnit XML and JSON results)
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'test-results'
              artifact: 'test-results'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: '📊 Upload Test Results (JUnit XML & JSON)'
          
          # Upload Allure results (always publish)
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-results'
              artifact: 'Allure-Results'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: '📊 Upload Allure Results'

  # Generate Allure Report
  - stage: Report
    displayName: 'Generate Allure Report'
    dependsOn: Test
    condition: succeededOrFailed()
    jobs:
      - job: AllureReport
        displayName: 'Generate Allure HTML Report'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Install Node.js on Ubuntu
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: '📦 Install Node.js'
          
          # Download Allure results from Test stage
          - task: DownloadPipelineArtifact@2
            condition: succeededOrFailed()
            inputs:
              artifact: 'Allure-Results'
              path: '$(System.DefaultWorkingDirectory)/allure-results'
            continueOnError: true
            displayName: '📥 Download Allure Results'
          
          # List what we downloaded
          - script: |
              echo "📋 Contents of downloaded artifacts:"
              if [ -d "allure-results" ]; then
                echo "✅ allure-results directory found"
                ls -la allure-results | head -20
                echo "📊 Total files: $(find allure-results -type f | wc -l)"
              else
                echo "⚠️ allure-results directory not found"
                ls -la $(System.DefaultWorkingDirectory)
              fi
            displayName: '🔍 List Downloaded Artifacts'
            continueOnError: true
          
          # Generate Allure Report
          - script: |
              mkdir -p allure-report
              
              # Check if allure-results exists and has files
              if [ -d "allure-results" ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
                echo "✅ Allure results found ($(find allure-results -type f | wc -l) files)"
                
                # Install allure command-line globally
                echo "📦 Installing allure-commandline globally..."
                npm install -g allure-commandline@latest
                
                # Check allure version
                echo "🔍 Verifying allure installation..."
                allure --version
                
                # Generate report
                echo "🚀 Generating Allure HTML report..."
                allure generate allure-results --clean -o allure-report
                
                # Verify report was generated
                if [ -f "allure-report/index.html" ]; then
                  echo "✅ Allure report generated successfully"
                  echo "📊 Report location: allure-report/index.html"
                  ls -la allure-report
                else
                  echo "❌ Allure report generation failed - index.html not found"
                  exit 1
                fi
              else
                echo "⚠️ No Allure results found (creating placeholder)"
                mkdir -p allure-report
                echo '<!DOCTYPE html><html><head><title>Allure Report - No Results</title><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;margin:40px;background:#f5f5f5}.container{background:#fff;padding:20px;border-radius:8px}.h1{color:#d9534f}p{color:#666}</style></head><body><div class="container"><h1>⚠️ No Allure Results Found</h1><p>The Allure results directory was empty or not published from the Test stage.</p></div></body></html>' > allure-report/index.html
                echo "✅ Placeholder report created"
              fi
            displayName: '🚀 Generate Allure Report'
            continueOnError: false
          
          # Publish Allure HTML Report
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-report'
              artifact: 'Allure-HTML-Report'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: '📤 Publish Allure HTML Report'
          
          # Display report location
          - script: |
              echo "📊 Allure Report Generation Complete"
              echo "✅ Download artifact: Allure-HTML-Report"
              echo "📍 View the index.html file in the artifact"
            displayName: '✅ Report Summary'
            continueOnError: true
