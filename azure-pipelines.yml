# Auto-authorize resources (IMPORTANT: Fixes permission issues in scheduled runs)
# These resources are now explicitly declared to allow scheduled pipeline access
resources:
  repositories:
  - repository: self
    type: git
    ref: refs/heads/main

# CI Trigger - Smart path-based trigger on code changes
trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - tests/**
      - pages/**
      - utils/**
      - global-setup.ts
      - playwright.config.ts
      - playwright.service.config.ts
      - package.json
      - package-lock.json
      - azure-pipelines.yml
    exclude:
      - docs/**
      - '*.md'
      - DOCUMENTATION-INDEX.md
      - IMPLEMENTATION-SUMMARY.md

# PR Trigger - Run tests when Pull Requests are created or updated
pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/**
      - pages/**
      - utils/**
      - global-setup.ts
      - playwright.config.ts
      - playwright.service.config.ts
      - package.json
      - package-lock.json
      - azure-pipelines.yml

# Scheduled triggers for daily and weekly execution
schedules:
  # Daily schedule - runs every day at 5:00 AM UTC (10:30 AM IST)
  - cron: "0 5 * * *"
    displayName: "Daily Test Execution at 5:00 AM UTC"
    branches:
      include:
        - main
    always: true  # Always run even if no changes

  # Weekly schedule - runs every Monday at 5:00 AM UTC (10:30 AM IST)
  - cron: "0 5 * * 1"
    displayName: "Weekly Test Execution - Monday 5:00 AM UTC"
    branches:
      include:
        - main
    always: true  # Always run even if no changes

pool:
  vmImage: 'windows-latest'

variables:
  # Using Access Token Authentication (enabled in workspace)
  - group: PlaywrightTestsConfig
  - group: Playwright-Testing-Secrets
  
  - name: PLAYWRIGHT_SERVICE_URL
    value: 'wss://eastus.api.playwright.microsoft.com/playwrightworkspaces/03f9e658-c2b3-45a4-9689-0c639e6f99c0/browsers'
  - name: D365_URL
    value: 'https://avs-isv-puat.sandbox.operations.dynamics.com'

  - name: USE_ACCESS_TOKEN
    value: 'true' # Using access token - workspace has it enabled

stages:
  - stage: Test
    displayName: 'Run Playwright Tests with Microsoft Playwright Testing'
    jobs:
      - job: PlaywrightTests
        displayName: 'Execute Tests at Scale'
        timeoutInMinutes: 60
        
        steps:
          # Checkout with full history for git operations
          - checkout: self
            fetchDepth: 0
            persistCredentials: true
          
          # Download authentication session file
          - task: DownloadSecureFile@1
            name: d365AuthFile
            displayName: '🔐 Download D365 Authentication Session'
            inputs:
              secureFile: 'D365AuthFile.json'
          
          # Setup authentication directory
          - task: PowerShell@2
            displayName: '📦 Setup Authentication'
            inputs:
              targetType: 'inline'
              script: |
                New-Item -ItemType Directory -Force -Path "auth"
                Copy-Item "$(d365AuthFile.secureFilePath)" -Destination "auth/D365AuthFile.json"
                Write-Host "✅ Session file ready"
          
          # Install Node.js
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: '📦 Install Node.js'

          # Install Python
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.13'
              addToPath: true
            displayName: '🐍 Install Python 3.13'

          # Install Python dependencies
          - task: PowerShell@2
            displayName: '📦 Install Python Dependencies'
            inputs:
              targetType: 'inline'
              script: |
                python -m pip install --upgrade pip
                pip install ipykernel pandas matplotlib numpy jupyter
          
          # Install dependencies
          - task: PowerShell@2
            displayName: '📦 Install Dependencies'
            inputs:
              targetType: 'inline'
              script: 'npm ci'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Install Allure reporter
          - task: PowerShell@2
            displayName: '📊 Install Allure Reporter'
            inputs:
              targetType: 'inline'
              script: 'npm install --save-dev @playwright/test allure-playwright'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Install Playwright browsers
          - task: PowerShell@2
            displayName: '🎭 Install Playwright Browsers'
            inputs:
              targetType: 'inline'
              script: 'npx playwright install --with-deps'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
          
          # Run Playwright tests with Microsoft Playwright Testing service
          # Supports both Service Principal (via AzureCLI) and Access Token authentication
          - task: PowerShell@2
            condition: eq(variables['USE_ACCESS_TOKEN'], 'true')
            displayName: '🧪 Run Playwright Tests - Access Token Auth (1 Worker)'
            env:
              PLAYWRIGHT_SERVICE_URL: $(PLAYWRIGHT_SERVICE_URL)
              PLAYWRIGHT_SERVICE_ACCESS_TOKEN: $(PLAYWRIGHT_SERVICE_ACCESS_TOKEN)
              D365_URL: $(D365_URL)
              CI: 'true'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🚀 Running Playwright tests with Access Token authentication..." -ForegroundColor Cyan
                Write-Host "📊 Service URL: $env:PLAYWRIGHT_SERVICE_URL" -ForegroundColor Yellow
                Write-Host "🌐 D365 URL: $env:D365_URL" -ForegroundColor Yellow
                Write-Host "⚡ Parallel workers: 1" -ForegroundColor Yellow
                Write-Host "🔐 Authentication: Access Token" -ForegroundColor Green
                Write-Host ""
                
                npx playwright test -c playwright.service.config.ts --workers=1
                
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "❌ Tests failed with exit code: $LASTEXITCODE" -ForegroundColor Red
                  exit $LASTEXITCODE
                }
                
                Write-Host ""
                Write-Host "✅ Tests completed successfully!" -ForegroundColor Green
                Write-Host "📊 View results at: https://playwright.microsoft.com/" -ForegroundColor Cyan
              workingDirectory: '$(System.DefaultWorkingDirectory)'

          # Generate test report from Jupyter notebook
          - task: PowerShell@2
            condition: succeededOrFailed()
            displayName: '📊 Generate Test Report (Jupyter Notebook)'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🚀 Generating test report from Jupyter notebook..." -ForegroundColor Cyan
                python -m jupyter nbconvert --to notebook --execute test_results_report.ipynb
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "✅ Test report generated successfully!" -ForegroundColor Green
                } else {
                  Write-Host "⚠️ Report generation failed, but continuing..." -ForegroundColor Yellow
                }
              workingDirectory: '$(System.DefaultWorkingDirectory)'

          # Verify report files were generated
          - task: PowerShell@2
            condition: succeededOrFailed()
            displayName: '🔍 Verify Allure Results Generated'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "📋 Checking allure-results folder..." -ForegroundColor Yellow
                if (Test-Path 'allure-results') {
                  $files = @(Get-ChildItem -Path 'allure-results' -Recurse -File)
                  Write-Host "✅ allure-results folder found" -ForegroundColor Green
                  Write-Host "📊 Total files: $($files.Count)" -ForegroundColor Green
                  
                  if ($files.Count -gt 0) {
                    Write-Host "✅ Allure results successfully generated!" -ForegroundColor Green
                    Write-Host "📁 Sample files:" -ForegroundColor Cyan
                    $files | Select-Object -First 5 | ForEach-Object { Write-Host "   - $($_.Name)" }
                  } else {
                    Write-Host "⚠️ allure-results folder is empty" -ForegroundColor Yellow
                  }
                } else {
                  Write-Host "❌ allure-results folder NOT found" -ForegroundColor Red
                  Write-Host "📁 Contents of working directory:" -ForegroundColor Yellow
                  Get-ChildItem -Path $(System.DefaultWorkingDirectory) | Select-Object -First 20 | ForEach-Object { Write-Host "   - $($_.Name)" }
                }
          
          # Publish test results
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/junit.xml'
              testRunTitle: 'D365 Playwright Tests (Microsoft Playwright Testing)'
              mergeTestResults: true
            displayName: '📊 Publish Test Results'
          
          # Check if report directory exists
          - task: PowerShell@2
            condition: always()
            displayName: '🔍 Check Report Directory'
            inputs:
              targetType: 'inline'
              script: |
                if (Test-Path 'playwright-report') {
                  Write-Host "##vso[task.setvariable variable=ReportExists]true"
                  Write-Host "✅ Report directory exists" -ForegroundColor Green
                } else {
                  Write-Host "##vso[task.setvariable variable=ReportExists]false"
                  Write-Host "⚠️ No report directory found" -ForegroundColor Yellow
                }
          
          # Upload Playwright HTML report (only if directory exists)
          - task: PublishPipelineArtifact@1
            condition: and(succeededOrFailed(), eq(variables['ReportExists'], 'true'))
            inputs:
              targetPath: 'playwright-report'
              artifact: 'Playwright-HTML-Report'
              publishLocation: 'pipeline'
            displayName: '📄 Upload Playwright HTML Report'
          
          # Upload test results artifacts (JUnit XML and JSON results)
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'test-results'
              artifact: 'test-results'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: '📊 Upload Test Results (JUnit XML & JSON)'
          
          # Upload Allure results (always publish)
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-results'
              artifact: 'Allure-Results'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: '📊 Upload Allure Results'

          # Upload Test Report Files (CSV, JSON, PNG)
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)'
              artifact: 'Test-Report-Artifacts'
              publishLocation: 'pipeline'
              patterns: |
                test_results.csv
                test_results.json
                test_results_visualization.png
                test_results_report.ipynb
            continueOnError: true
            displayName: '📊 Upload Test Report (CSV, JSON, PNG, Notebook)'

          # Commit test results back to repository (Auto-sync with notebook)
          - task: PowerShell@2
            displayName: '🔄 Auto-sync Test Results to Repository'
            condition: succeededOrFailed()
            continueOnError: true
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "🔄 Auto-syncing test results to repository..." -ForegroundColor Cyan
                
                # Configure git
                git config --global user.email "azure-pipelines@example.com"
                git config --global user.name "Azure Pipelines Bot"
                git config --global core.longpaths true
                
                # Ensure we're on the correct branch (handle detached HEAD state)
                Write-Host "📌 Checking git branch state..." -ForegroundColor Yellow
                $currentBranch = git rev-parse --abbrev-ref HEAD
                Write-Host "   Current branch: $currentBranch" -ForegroundColor Gray
                if ($currentBranch -eq "HEAD") {
                    Write-Host "   Detached HEAD detected, checking out $(Build.SourceBranch)..." -ForegroundColor Yellow
                    git checkout -B $(Build.SourceBranch)
                }
                
                # Check for changes
                Write-Host "📋 Current git status:" -ForegroundColor Yellow
                git status --porcelain
                
                # Check if test result files exist
                $hasChanges = $false
                if ((Test-Path "test_results.csv") -or (Test-Path "test_results.json") -or (Test-Path "test_results_visualization.png") -or (Test-Path "test_cases_detailed.csv")) {
                    $hasChanges = $true
                }
                
                # Check if allure-results has files
                if (Test-Path "allure-results") {
                    $allureFiles = @(Get-ChildItem -Path "allure-results" -Recurse -File -ErrorAction SilentlyContinue)
                    if ($allureFiles.Count -gt 0) {
                        $hasChanges = $true
                    }
                }
                
                if ($hasChanges) {
                    Write-Host "📝 Found test results to commit..." -ForegroundColor Green
                    git add test_results.csv test_results.json test_results_visualization.png test_cases_detailed.csv 2>$null
                    git add allure-results/ 2>$null
                    
                    $status = git status --porcelain
                    if (-not $status) {
                        Write-Host "✅ No changes to commit" -ForegroundColor Green
                    } else {
                        Write-Host "📝 Committing changes..." -ForegroundColor Cyan
                        git commit -m "🤖 Auto: Update test results from pipeline run #$(Build.BuildId)"
                        
                        Write-Host "🚀 Pushing to repository..." -ForegroundColor Cyan
                        Write-Host "   Branch: $(Build.SourceBranch)" -ForegroundColor Gray
                        
                        # Push without stderr redirect to avoid protocol message misinterpretation
                        git push origin $(Build.SourceBranch)
                        
                        if ($LASTEXITCODE -eq 0) {
                            Write-Host "✅ Test results committed and pushed successfully!" -ForegroundColor Green
                        } else {
                            Write-Host "⚠️ Push may have failed, checking status..." -ForegroundColor Yellow
                            git log -1 --oneline
                        }
                    }
                } else {
                    Write-Host "⚠️ No test results to commit" -ForegroundColor Yellow
                }

          # Send Teams notification with test results summary
          - task: PowerShell@2
            displayName: '📢 Send Teams Notification'
            inputs:
              targetType: 'inline'
              script: |
                try {
                    Write-Host "🔍 Checking Teams webhook configuration..." -ForegroundColor Cyan
                    $webhook = $env:TEAMS_WEBHOOK
                    
                    # Step 1: Verify webhook variable exists
                    if ([string]::IsNullOrWhiteSpace($webhook)) {
                        Write-Host "⚠️ TEAMS_WEBHOOK variable not configured in PlaywrightTestsConfig group" -ForegroundColor Yellow
                        Write-Host "   To enable Teams notifications:" -ForegroundColor Gray
                        Write-Host "   1. Go to Pipelines → Library → Variable groups" -ForegroundColor Gray
                        Write-Host "   2. Open PlaywrightTestsConfig" -ForegroundColor Gray
                        Write-Host "   3. Ensure TEAMS_WEBHOOK is set with your Teams webhook URL" -ForegroundColor Gray
                        Write-Host "   4. Mark as Secret ✓" -ForegroundColor Gray
                        exit 0
                    }
                    
                    Write-Host "✅ TEAMS_WEBHOOK variable found" -ForegroundColor Green
                    
                    # Step 2: Parse test results from Playwright results (most reliable)
                    $testExecuted = $false
                    $total_tests = 0
                    $passed_tests = 0
                    $failed_tests = 0
                    $skipped_tests = 0
                    $pass_rate = 0
                    $totalTime = "N/A"
                    
                    # Try Playwright results first (most reliable)
                    $playwrightResultsPath = 'test-results/results.json'
                    if (Test-Path $playwrightResultsPath) {
                        Write-Host "✅ Playwright results.json found" -ForegroundColor Green
                        $pwResults = Get-Content $playwrightResultsPath | ConvertFrom-Json
                        $stats = $pwResults.stats
                        
                        $passed_tests = $stats.expected
                        $failed_tests = $stats.unexpected
                        $skipped_tests = $stats.skipped
                        $total_tests = $passed_tests + $failed_tests + $skipped_tests
                        
                        if ($total_tests -gt 0) {
                            $pass_rate = [math]::Round(($passed_tests / ($passed_tests + $failed_tests)) * 100, 2)
                        }
                        $testExecuted = $true
                        Write-Host "📊 Tests: $total_tests | Passed: $passed_tests | Failed: $failed_tests | Skipped: $skipped_tests" -ForegroundColor Green
                    }
                    else {
                        Write-Host "⚠️ Playwright results.json not found, checking for test artifacts..." -ForegroundColor Yellow
                        # Fallback: Check for any test artifacts
                        if ((Test-Path 'playwright-report') -or (Test-Path 'allure-results')) {
                            Write-Host "✅ Test artifacts found" -ForegroundColor Green
                            $testExecuted = $true
                            # Use placeholder values
                            $total_tests = "Unknown"
                            $passed_tests = "Check report"
                            $failed_tests = "N/A"
                            $pass_rate = 0
                        }
                    }
                    
                    # Step 3: Send notification if tests executed
                    if ($testExecuted) {
                        Write-Host "📢 Tests executed, sending Teams notification..." -ForegroundColor Cyan
                        
                        $statusColor = if ($failed_tests -eq 0 -or $failed_tests -eq "N/A") { "28a745" } else { "dc3545" }
                        $statusIcon = if ($failed_tests -eq 0 -or $failed_tests -eq "N/A") { "✅" } else { "❌" }
                        
                        $body = @{
                            "@type" = "MessageCard"
                            "@context" = "https://schema.org/extensions"
                            "summary" = "Playwright Test Results - Build #$(Build.BuildId)"
                            "themeColor" = $statusColor
                            "sections" = @(@{
                                "activityTitle" = "$statusIcon Playwright Test Results - Build #$(Build.BuildId)"
                                "activitySubtitle" = "$(Build.Repository.Name)"
                                "facts" = @(
                                    @{ "name" = "Total Tests"; "value" = "$total_tests" },
                                    @{ "name" = "✅ Passed"; "value" = "$passed_tests" },
                                    @{ "name" = "❌ Failed"; "value" = "$failed_tests" },
                                    @{ "name" = "⏭️ Skipped"; "value" = "$skipped_tests" },
                                    @{ "name" = "Pass Rate"; "value" = "${pass_rate}%" }
                                )
                            })
                        } | ConvertTo-Json -Depth 10
                        
                        $response = Invoke-RestMethod -Uri $webhook -Method Post -ContentType 'application/json' -Body $body -ErrorAction Stop
                        Write-Host "✅ Teams notification sent successfully!" -ForegroundColor Green
                        Write-Host "   Webhook: $($webhook.Substring(0, 50))..." -ForegroundColor Gray
                    } else {
                        Write-Host "⚠️ No test execution detected - skipping notification" -ForegroundColor Yellow
                        Write-Host "   Expected: test-results/results.json or test artifacts" -ForegroundColor Gray
                    }
                } catch {
                    Write-Host "❌ Error sending Teams notification: $_" -ForegroundColor Red
                    Write-Host "   Details: $($_.Exception.Message)" -ForegroundColor Yellow
                    exit 1
                }
            env:
              TEAMS_WEBHOOK: $(TEAMS_WEBHOOK)
            condition: always()

  # Generate Allure Report
  - stage: Report
    displayName: 'Generate Allure Report'
    dependsOn: Test
    condition: succeededOrFailed()
    jobs:
      - job: AllureReport
        displayName: 'Generate Allure HTML Report'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Install Node.js on Ubuntu
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: '📦 Install Node.js'
          
          # Download Allure results from Test stage
          - task: DownloadPipelineArtifact@2
            condition: succeededOrFailed()
            inputs:
              artifact: 'Allure-Results'
              path: '$(System.DefaultWorkingDirectory)/allure-results'
            continueOnError: true
            displayName: '📥 Download Allure Results'
          
          # List what we downloaded
          - script: |
              echo "📋 Contents of downloaded artifacts:"
              if [ -d "allure-results" ]; then
                echo "✅ allure-results directory found"
                ls -la allure-results | head -20
                echo "📊 Total files: $(find allure-results -type f | wc -l)"
              else
                echo "⚠️ allure-results directory not found"
                ls -la $(System.DefaultWorkingDirectory)
              fi
            displayName: '🔍 List Downloaded Artifacts'
            continueOnError: true
          
          # Generate Allure Report
          - script: |
              mkdir -p allure-report
              
              # Check if allure-results exists and has files
              if [ -d "allure-results" ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
                echo "✅ Allure results found ($(find allure-results -type f | wc -l) files)"
                
                # Install allure command-line globally
                echo "📦 Installing allure-commandline globally..."
                npm install -g allure-commandline@latest
                
                # Check allure version
                echo "🔍 Verifying allure installation..."
                allure --version
                
                # Generate report
                echo "🚀 Generating Allure HTML report..."
                allure generate allure-results --clean -o allure-report
                
                # Verify report was generated
                if [ -f "allure-report/index.html" ]; then
                  echo "✅ Allure report generated successfully"
                  echo "📊 Report location: allure-report/index.html"
                  ls -la allure-report
                else
                  echo "❌ Allure report generation failed - index.html not found"
                  exit 1
                fi
              else
                echo "⚠️ No Allure results found (creating placeholder)"
                mkdir -p allure-report
                echo '<!DOCTYPE html><html><head><title>Allure Report - No Results</title><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;margin:40px;background:#f5f5f5}.container{background:#fff;padding:20px;border-radius:8px}.h1{color:#d9534f}p{color:#666}</style></head><body><div class="container"><h1>⚠️ No Allure Results Found</h1><p>The Allure results directory was empty or not published from the Test stage.</p></div></body></html>' > allure-report/index.html
                echo "✅ Placeholder report created"
              fi
            displayName: '🚀 Generate Allure Report'
            continueOnError: false
          
          # Publish Allure HTML Report
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-report'
              artifact: 'Allure-HTML-Report'
              publishLocation: 'pipeline'
            continueOnError: true
            displayName: '📤 Publish Allure HTML Report'
          
          # Display report location
          - script: |
              echo "📊 Allure Report Generation Complete"
              echo "✅ Download artifact: Allure-HTML-Report"
              echo "📍 View the index.html file in the artifact"
            displayName: '✅ Report Summary'
            continueOnError: true
