trigger:
  - main

# Use Microsoft's Playwright container image
resources:
  containers:
  - container: playwright
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    options: --user root

pool:
  vmImage: 'ubuntu-latest'

container: playwright

variables:
  - name: CI
    value: 'true'
  - name: D365_URL
    value: 'https://avs-isv-puat.sandbox.operations.dynamics.com'

stages:
  - stage: Test
    displayName: 'Run Playwright Tests in Cloud Container'
    jobs:
      - job: PlaywrightTests
        displayName: 'Execute D365 Tests'
        timeoutInMinutes: 30
        
        steps:
          # Download authentication session
          - task: DownloadSecureFile@1
            name: d365AuthFile
            displayName: '🔐 Download D365 Session'
            inputs:
              secureFile: 'D365AuthFile.json'
          
          # Setup auth directory
          - script: |
              mkdir -p auth
              cp $(d365AuthFile.secureFilePath) auth/D365AuthFile.json
              echo "✅ Session file ready"
            displayName: '📦 Setup Authentication'
          
          # Install Node.js (container has Node already)
          - script: |
              node --version
              npm --version
            displayName: '📋 Check Node.js Version'
          
          # Install dependencies
          - script: npm ci
            displayName: '📦 Install Dependencies'
          
          # Verify Playwright installation (container has browsers pre-installed)
          - script: npx playwright --version
            displayName: '🎭 Verify Playwright'
          
          # Run tests with cloud resources (4 parallel workers)
          - script: |
              npx playwright test --workers=4 --reporter=html,junit
            displayName: '🧪 Run Playwright Tests (4 Workers)'
            env:
              D365_URL: $(D365_URL)
              CI: $(CI)
          
          # Publish test results
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'D365 Playwright Tests (Cloud Container)'
              mergeTestResults: true
            displayName: '📊 Publish Test Results'
          
          # Publish HTML report
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report'
              publishLocation: 'pipeline'
            displayName: '📄 Publish HTML Report'
          
          # Publish screenshots and videos on failure
          - task: PublishPipelineArtifact@1
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'test-results'
              publishLocation: 'pipeline'
            displayName: '📸 Publish Test Artifacts'
          
          # Publish Allure results
          - task: PublishPipelineArtifact@1
            condition: succeededOrFailed()
            inputs:
              targetPath: 'allure-results'
              artifact: 'allure-results'
              publishLocation: 'pipeline'
            displayName: '📊 Publish Allure Results'

  # Optional: Generate Allure Report
  - stage: Report
    displayName: 'Generate Allure Report'
    dependsOn: Test
    condition: succeededOrFailed()
    jobs:
      - job: AllureReport
        displayName: 'Generate Allure HTML Report'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'allure-results'
              path: '$(System.DefaultWorkingDirectory)/allure-results'
          
          - script: |
              npm install -g allure-commandline
              allure generate allure-results --clean -o allure-report
            displayName: 'Generate Allure Report'
          
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'allure-report'
              artifact: 'allure-report-html'
              publishLocation: 'pipeline'
            displayName: 'Publish Allure HTML Report'
